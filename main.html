<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GitHub Banner</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#111;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;

}

.banner{

    width:1600px;
    height:500px;

    position:relative;
    overflow:hidden;

    background:#000;

}

/* VIDEO */

.banner video{

    position:absolute;

    inset:0;

    width:100%;
    height:100%;

    object-fit:cover;

}

/* Overlay */

.banner::before{

    content:"";

    position:absolute;
    inset:0;

    background:
    linear-gradient(
        rgba(0,0,0,.65),
        rgba(0,0,0,.60)
    );

}

/* Center Content */

.content{

    position:absolute;

    inset:0;

    display:flex;

    justify-content:center;
    align-items:center;

    flex-direction:column;

    text-align:center;

    z-index:10;

}

/* NAME */


@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@800&display=swap');

.name{

    font-family:"Manrope",sans-serif;

    font-size:95px;

    font-weight:800;

    letter-spacing:1px;

    color:white;

}

/* Line */

.line{

    width:120px;

    height:3px;

    margin:30px 0;

    border-radius:50px;

    background:#4FD1FF;

}

/* Quote */

.quote{

    font-family:"Space Grotesk";

    font-size:20px;

    color:#4FD1FF;

    font-weight:600;

    letter-spacing:2px;

}

.banner video{

    position:absolute;
    inset:0;

    width:100%;
    height:100%;

    object-fit:cover;

    opacity:0.40;

}

</style>

</head>

<body>

<div class="banner">

<video autoplay muted loop playsinline>

<source src="/assets/contact-bg.mp4" type="video/mp4">

</video>

<div class="content">

<div class="name">

Farhan Islam Rafid

</div>



<div class="line"></div>

<div class="quote">

Always Learning. Always Building.

</div>

</div>

</div>

</body>
</html>
