<svg width="1600" height="500" viewBox="0 0 1600 500" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes floatY {
      0%   { transform: translateY(0px); }
      50%  { transform: translateY(-14px); }
      100% { transform: translateY(0px); }
    }
    @keyframes floatYSmall {
      0%   { transform: translateY(0px); }
      50%  { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }
    @keyframes drift {
      0%   { transform: translate(0px,0px); opacity: 0.3; }
      50%  { transform: translate(6px,-16px); opacity: 0.9; }
      100% { transform: translate(0px,0px); opacity: 0.3; }
    }
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.55; }
      50%      { opacity: 1; }
    }
    @keyframes pulseSoft {
      0%, 100% { opacity: 0.6; }
      50%      { opacity: 0.95; }
    }
    @keyframes blink {
      0%, 45% { opacity: 1; }
      50%, 95%{ opacity: 0; }
      100%    { opacity: 1; }
    }
    @keyframes dashFlow {
      to { stroke-dashoffset: -200; }
    }
    @keyframes ledBlink {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.15; }
    }
    @keyframes typeLine {
      0%   { clip-path: inset(0 100% 0 0); }
      8%   { clip-path: inset(0 0 0 0); }
      92%  { clip-path: inset(0 0 0 0); }
      100% { clip-path: inset(0 0 0 0); }
    }
    @keyframes titleGlow {
      0%, 100% { filter: drop-shadow(0 0 2px rgba(79,209,255,0.15)); }
      50%      { filter: drop-shadow(0 0 10px rgba(79,209,255,0.55)); }
    }
    @keyframes ringSpin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes shimmer {
      0%, 100% { opacity: 0.25; }
      50%      { opacity: 0.6; }
    }

    .float-slow   { animation: floatY 6s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .float-med    { animation: floatY 5s ease-in-out infinite; animation-delay: 0.6s; transform-box: fill-box; transform-origin: center; }
    .float-small  { animation: floatYSmall 4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .particle     { animation: drift 5s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .glow-pulse   { animation: pulseGlow 4.5s ease-in-out infinite; }
    .glow-pulse2  { animation: pulseGlow 5.5s ease-in-out infinite; animation-delay: 1s; }
    .glow-pulse3  { animation: pulseSoft 4s ease-in-out infinite; animation-delay: 0.5s; }
    .cursor-blink { animation: blink 1.1s step-end infinite; }
    .circuit-line { stroke-dasharray: 8 6; animation: dashFlow 3.5s linear infinite; }
    .led          { animation: ledBlink 1.6s ease-in-out infinite; }
    .code-l1 { animation: typeLine 8s ease-in-out infinite; }
    .code-l2 { animation: typeLine 8s ease-in-out infinite; animation-delay: 0.35s; }
    .code-l3 { animation: typeLine 8s ease-in-out infinite; animation-delay: 0.7s; }
    .code-l4 { animation: typeLine 8s ease-in-out infinite; animation-delay: 1.05s; }
    .code-l5 { animation: typeLine 8s ease-in-out infinite; animation-delay: 1.4s; }
    .code-l6 { animation: typeLine 8s ease-in-out infinite; animation-delay: 1.75s; }
    .title-glow { animation: titleGlow 5s ease-in-out infinite; }
    .ring-spin  { animation: ringSpin 14s linear infinite; transform-box: fill-box; transform-origin: center; }
    .shimmer    { animation: shimmer 3s ease-in-out infinite; }
  </style>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060B18"/>
      <stop offset="45%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#0A1220"/>
    </linearGradient>

    <radialGradient id="cyanGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4FD1FF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4FD1FF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="purpleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C5CFF" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#7C5CFF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="blueGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1424"/>
      <stop offset="100%" stop-color="#141F38"/>
    </linearGradient>

    <linearGradient id="laptopBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1B2740"/>
      <stop offset="100%" stop-color="#0E1626"/>
    </linearGradient>

    <linearGradient id="glassPanel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.02"/>
    </linearGradient>

    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#CFEFFF"/>
    </linearGradient>

    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>

    <pattern id="circuitPattern" width="140" height="140" patternUnits="userSpaceOnUse">
      <path d="M0 70 H45 M55 70 H140" stroke="#4FD1FF" stroke-width="1" fill="none" opacity="0.5"/>
      <path d="M70 0 V45 M70 55 V140" stroke="#4FD1FF" stroke-width="1" fill="none" opacity="0.5"/>
      <circle cx="70" cy="70" r="3" fill="#4FD1FF" opacity="0.6"/>
      <circle cx="0" cy="70" r="2" fill="#4FD1FF" opacity="0.4"/>
      <circle cx="140" cy="70" r="2" fill="#4FD1FF" opacity="0.4"/>
      <circle cx="70" cy="0" r="2" fill="#4FD1FF" opacity="0.4"/>
      <circle cx="70" cy="140" r="2" fill="#4FD1FF" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Base background -->
  <rect width="1600" height="500" fill="url(#bgGrad)"/>

  <!-- Circuit texture, subtle, right-weighted -->
  <rect x="750" y="0" width="850" height="500" fill="url(#circuitPattern)" opacity="0.12"/>

  <!-- Glows -->
  <circle class="glow-pulse" cx="1250" cy="120" r="260" fill="url(#cyanGlow)"/>
  <circle class="glow-pulse2" cx="1420" cy="420" r="300" fill="url(#purpleGlow)"/>
  <circle class="glow-pulse3" cx="120" cy="450" r="260" fill="url(#blueGlow)"/>
  <circle class="glow-pulse" cx="980" cy="430" r="200" fill="url(#purpleGlow)"/>

  <!-- Abstract soft geometric shapes -->
  <g opacity="0.5">
    <rect class="ring-spin" x="60" y="40" width="120" height="120" rx="20" fill="none" stroke="#4FD1FF" stroke-width="1" opacity="0.25" transform="rotate(18 120 100)"/>
    <circle class="ring-spin" cx="1520" cy="70" r="46" fill="none" stroke="#7C5CFF" stroke-width="1" opacity="0.3"/>
    <rect class="float-small" x="1470" y="230" width="70" height="70" rx="14" fill="none" stroke="#4FD1FF" stroke-width="1" opacity="0.22" transform="rotate(-12 1505 265)"/>
  </g>

  <!-- Floating particles -->
  <g fill="#4FD1FF">
    <circle class="particle" style="animation-delay:0s"    cx="200" cy="90"  r="2.4" opacity="0.7"/>
    <circle class="particle" style="animation-delay:0.6s"  cx="340" cy="150" r="1.6" opacity="0.5"/>
    <circle class="particle" style="animation-delay:1.2s"  cx="640" cy="60"  r="2"   opacity="0.6"/>
    <circle class="particle" style="animation-delay:1.8s"  cx="720" cy="420" r="2.2" opacity="0.5"/>
    <circle class="particle" style="animation-delay:0.3s"  cx="90"  cy="330" r="1.8" opacity="0.55"/>
    <circle class="particle" style="animation-delay:2.1s"  cx="500" cy="440" r="1.6" opacity="0.4"/>
    <circle class="particle" style="animation-delay:0.9s"  cx="1560" cy="180" r="2"  opacity="0.5"/>
    <circle class="particle" style="animation-delay:1.5s"  cx="1300" cy="330" r="1.8" opacity="0.45"/>
    <circle class="particle" style="animation-delay:2.4s"  cx="1080" cy="80" r="1.6" opacity="0.4"/>
  </g>
  <g fill="#7C5CFF">
    <circle class="particle" style="animation-delay:0.8s" cx="420" cy="90" r="1.8" opacity="0.5"/>
    <circle class="particle" style="animation-delay:1.9s" cx="1180" cy="440" r="2" opacity="0.4"/>
    <circle class="particle" style="animation-delay:0.4s" cx="1400" cy="150" r="1.6" opacity="0.45"/>
  </g>

  <!-- ===================== LEFT TEXT ===================== -->
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
    <text x="70" y="185" font-size="62" font-weight="700" fill="url(#nameGrad)" letter-spacing="0.5" class="title-glow">Farhan Islam Rafid</text>

    <g transform="translate(72,205)">
      <rect x="0" y="4" width="26" height="17" rx="2.5" fill="none" stroke="#4FD1FF" stroke-width="2"/>
      <rect x="-4" y="21" width="34" height="4" rx="2" fill="#4FD1FF"/>
      <text x="42" y="20" font-size="24" font-weight="600" fill="#4FD1FF">Computer Science &amp; Technology Student</text>
    </g>

    <text x="72" y="270" font-size="17" font-weight="400" fill="#9FB3C8" letter-spacing="0.2">
      Learning Java  •  Building Projects  •  Solving LeetCode  •  Exploring more
    </text>

    <!-- divider -->
    <rect x="72" y="300" width="150" height="3" rx="1.5" fill="#4FD1FF" opacity="0.7"/>

    <text x="72" y="420" font-size="22" font-style="italic" font-weight="500" fill="#E5EEF7">
      "Always Learning. Always Building."
    </text>
  </g>

  <!-- ===================== RIGHT ILLUSTRATION ===================== -->
  <g>
    <!-- Glass panel backdrop for workspace -->
    <rect x="880" y="90" width="640" height="360" rx="28" fill="url(#glassPanel)" stroke="#4FD1FF" stroke-width="1" opacity="0.5"/>

    <!-- ===== Laptop ===== -->
    <g transform="translate(950,150)">
      <!-- Screen -->
      <rect x="0" y="0" width="360" height="230" rx="14" fill="url(#laptopBody)" stroke="#33465F" stroke-width="2"/>
      <rect x="14" y="14" width="332" height="184" rx="6" fill="url(#screenGrad)" stroke="#4FD1FF" stroke-width="1" opacity="0.9"/>

      <!-- VS Code style top bar -->
      <rect x="14" y="14" width="332" height="22" fill="#0B1424"/>
      <circle cx="28" cy="25" r="4" fill="#FF6B6B" opacity="0.85"/>
      <circle cx="44" cy="25" r="4" fill="#FFD166" opacity="0.85"/>
      <circle cx="60" cy="25" r="4" fill="#4FD1FF" opacity="0.85"/>
      <text x="180" y="29" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#7C93AE" text-anchor="middle">Main.java — VS Code</text>

      <!-- sidebar -->
      <rect x="14" y="36" width="26" height="162" fill="#0E1A2E"/>
      <circle cx="27" cy="52" r="3" fill="#4FD1FF" opacity="0.7"/>
      <circle cx="27" cy="68" r="3" fill="#7C5CFF" opacity="0.6"/>
      <circle cx="27" cy="84" r="3" fill="#4FD1FF" opacity="0.5"/>

      <!-- code lines (typewriter reveal loop) -->
      <g font-family="'Consolas','Courier New',monospace" font-size="10.5">
        <g class="code-l1">
          <text x="48" y="55" fill="#7C5CFF">public class</text>
          <text x="118" y="55" fill="#4FD1FF">Main</text>
          <text x="150" y="55" fill="#CFEFFF">{</text>
        </g>

        <g class="code-l2">
          <text x="58" y="72" fill="#7C5CFF">public static void</text>
          <text x="170" y="72" fill="#FFD166">main</text>
          <text x="192" y="72" fill="#CFEFFF">(String[] args) {</text>
        </g>

        <g class="code-l3">
          <text x="68" y="89" fill="#9FB3C8">System.out.println(</text>
          <text x="210" y="89" fill="#4ADE80">"Hello, World!"</text>
          <text x="300" y="89" fill="#CFEFFF">);</text>
        </g>

        <g class="code-l4">
          <text x="68" y="106" fill="#7C5CFF">int</text>
          <text x="86" y="106" fill="#CFEFFF">score = </text>
          <text x="140" y="106" fill="#4FD1FF">100</text>
          <text x="160" y="106" fill="#CFEFFF">;</text>
        </g>

        <g class="code-l5">
          <text x="58" y="123" fill="#CFEFFF">}</text>
          <text x="48" y="140" fill="#CFEFFF">}</text>
        </g>

        <g class="code-l6">
          <text x="48" y="164" fill="#4B5D75">// building, one commit at a time</text>
        </g>
      </g>

      <!-- blinking cursor -->
      <rect class="cursor-blink" x="118" y="153" width="6" height="12" fill="#4FD1FF" opacity="0.8"/>

      <!-- Base of laptop -->
      <path d="M -18 230 L 378 230 L 398 254 L -38 254 Z" fill="#1B2740" stroke="#33465F" stroke-width="1.5"/>
      <rect x="150" y="230" width="60" height="4" rx="2" fill="#0B1424"/>
    </g>

    <!-- GitHub-style icon on screen (stylized, generic branch/commit mark, not the Octocat) -->
    <g transform="translate(1250,175)" opacity="0.9">
      <circle class="glow-pulse3" cx="0" cy="0" r="16" fill="#0B1424" stroke="#4FD1FF" stroke-width="1.2"/>
      <circle cx="0" cy="-7" r="2.6" fill="#4FD1FF"/>
      <circle cx="-7" cy="7" r="2.6" fill="#7C5CFF"/>
      <circle cx="7" cy="7" r="2.6" fill="#4FD1FF"/>
      <path d="M0 -4.4 V0 M0 0 L-7 4.6 M0 0 L7 4.6" stroke="#CFEFFF" stroke-width="1.1" fill="none"/>
    </g>

    <!-- ===== ESP32 board ===== -->
    <g transform="translate(960,410)">
      <rect x="0" y="0" width="150" height="66" rx="6" fill="#101B2E" stroke="#33465F" stroke-width="1.5"/>
      <rect x="45" y="12" width="60" height="42" rx="3" fill="#0B1424" stroke="#4FD1FF" stroke-width="1"/>
      <text x="75" y="37" font-family="'Consolas',monospace" font-size="9" fill="#4FD1FF" text-anchor="middle">ESP32</text>
      <!-- pins -->
      <g fill="#9FB3C8">
        <rect x="4" y="-6" width="3" height="8"/>
        <rect x="14" y="-6" width="3" height="8"/>
        <rect x="24" y="-6" width="3" height="8"/>
        <rect x="34" y="-6" width="3" height="8"/>
        <rect x="4" y="64" width="3" height="8"/>
        <rect x="14" y="64" width="3" height="8"/>
        <rect x="24" y="64" width="3" height="8"/>
        <rect x="34" y="64" width="3" height="8"/>
        <rect x="113" y="-6" width="3" height="8"/>
        <rect x="123" y="-6" width="3" height="8"/>
        <rect x="133" y="-6" width="3" height="8"/>
        <rect x="143" y="-6" width="3" height="8"/>
        <rect x="113" y="64" width="3" height="8"/>
        <rect x="123" y="64" width="3" height="8"/>
        <rect x="133" y="64" width="3" height="8"/>
        <rect x="143" y="64" width="3" height="8"/>
      </g>
      <circle class="led" cx="12" cy="10" r="2" fill="#4ADE80" opacity="0.9"/>
      <text x="120" y="14" font-family="Arial" font-size="7" fill="#7C93AE">WiFi/BT</text>
    </g>

    <!-- Floating code symbols -->
    <g font-family="'Consolas','Courier New',monospace" font-weight="700" fill="#4FD1FF">
      <text class="float-slow" style="animation-delay:0s"    x="895" y="130" font-size="26" opacity="0.55">{ }</text>
      <text class="float-med"  style="animation-delay:0.8s"  x="1465" y="120" font-size="30" opacity="0.6" fill="#7C5CFF">&lt;/&gt;</text>
      <text class="float-slow" style="animation-delay:1.6s"  x="1440" y="400" font-size="24" opacity="0.5">&lt; &gt;</text>
      <text class="float-med"  style="animation-delay:0.4s"  x="905" y="440" font-size="20" opacity="0.4" fill="#7C5CFF">{ }</text>
      <text class="float-slow" style="animation-delay:1.2s"  x="1520" y="300" font-size="22" opacity="0.5">&lt;/&gt;</text>
    </g>

    <!-- AI-inspired thin circuit lines connecting elements -->
    <g stroke="#4FD1FF" stroke-width="1" fill="none" opacity="0.45">
      <path class="circuit-line" d="M1310 175 Q1380 175 1380 230 T1450 260"/>
      <path class="circuit-line" style="animation-delay:0.5s" d="M960 380 Q940 350 960 320"/>
      <path class="circuit-line" style="animation-delay:1s" d="M1310 300 Q1360 320 1360 360 T1420 400"/>
    </g>
    <g fill="#4FD1FF" opacity="0.6">
      <circle class="glow-pulse" cx="1450" cy="260" r="2.4"/>
      <circle class="glow-pulse2" cx="1420" cy="400" r="2.4"/>
      <circle class="glow-pulse3" cx="960" cy="320" r="2.4"/>
    </g>
  </g>
</svg>
